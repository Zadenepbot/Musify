name: Quick Test Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_quick:
    name: Quick Universal Release Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
            
      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew --console=plain assembleFossRelease --warning-mode summary -x lint -x lintFossRelease
        env:
          LASTFM_API_KEY: "dummy"
          LASTFM_SECRET: "dummy"

      - name: List APK files
        run: find app/build/outputs/apk -name "*.apk"

      - name: Sign APK with debug key
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          
          APK=app/build/outputs/apk/foss/release/app-foss-release-unsigned.apk
          
          # Align
          ${ANDROID_HOME}/build-tools/35.0.0/zipalign -v 4 "$APK" app-aligned.apk
          
          # Sign
          ${ANDROID_HOME}/build-tools/35.0.0/apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out app-signed.apk \
            app-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metrolist_andker
          path: metrolist-andker.apk
